<div class="admin-shell">

  <!-- Mobile Overlay -->
  <div *ngIf="isMobileSidebarOpen" class="admin-overlay" (click)="isMobileSidebarOpen = false"></div>

  <!-- Sidebar -->
  <aside class="admin-sidebar" [class.collapsed]="!isSidebarOpen" [class.mobile-open]="isMobileSidebarOpen">

    <!-- Brand -->
    <div class="admin-sidebar-brand">
      <div class="brand-logo">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="white"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      </div>
      <div *ngIf="isSidebarOpen" class="brand-text">
        <p class="brand-name">{{ storeName$ | async }}</p>
        <p class="brand-sub">Admin Panel</p>
      </div>
      <button type="button" class="sidebar-toggle" title="Toggle sidebar" (click)="isSidebarOpen = !isSidebarOpen">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Nav -->
    <nav class="admin-nav">
      <a *ngFor="let item of navItems"
         [routerLink]="item.route"
         class="sidebar-item"
         [class.active]="isActive(item.route)"
         [class.icon-only]="!isSidebarOpen"
         [title]="!isSidebarOpen ? item.label : ''">
        <ng-container [ngSwitch]="item.icon">
          <svg *ngSwitchCase="'dashboard'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          <svg *ngSwitchCase="'catalog'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          <svg *ngSwitchCase="'orders'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <svg *ngSwitchCase="'customers'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <svg *ngSwitchCase="'coupon'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
          <svg *ngSwitchCase="'analytics'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          <svg *ngSwitchCase="'settings'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </ng-container>
        <span *ngIf="isSidebarOpen" class="sidebar-label">{{ item.label }}</span>
        <span *ngIf="isSidebarOpen && item.badge" class="sidebar-badge">{{ item.badge }}</span>
      </a>
    </nav>

    <!-- Footer -->
    <div class="admin-sidebar-footer">
      <a routerLink="/" class="sidebar-item" [class.icon-only]="!isSidebarOpen" title="Ver Loja">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        <span *ngIf="isSidebarOpen" class="sidebar-label">Ver Loja</span>
      </a>
      <button type="button" class="sidebar-item sidebar-logout" [class.icon-only]="!isSidebarOpen" title="Sair" (click)="logout()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span *ngIf="isSidebarOpen" class="sidebar-label">Sair</span>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="admin-main">

    <!-- Topbar -->
    <header class="admin-topbar">
      <div class="topbar-left">
        <button type="button" class="topbar-menu-btn" title="Menu" (click)="isMobileSidebarOpen = true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="topbar-title">Portal do Lojista</span>
      </div>
      <div class="topbar-right">

        <!-- Notification Bell -->
        <div class="notif-wrapper">
          <button type="button" class="topbar-icon-btn" aria-label="Notificações" (click)="toggleNotif()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span *ngIf="unreadCount > 0" class="notif-dot"></span>
          </button>

          <!-- Dropdown -->
          <div *ngIf="isNotifOpen" class="notif-dropdown anim-fade-in">
            <div class="notif-header">
              <span class="notif-title">Notificações</span>
              <button type="button" *ngIf="unreadCount > 0" class="notif-mark-read" (click)="markAllRead()">Marcar todas como lidas</button>
            </div>

            <div *ngIf="notifications.length === 0" class="notif-empty">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" class="notif-empty-icon"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
              <p>Nenhuma notificação</p>
            </div>

            <div class="notif-list">
              <button *ngFor="let n of notifications" class="notif-item" [class.unread]="!n.read" (click)="openNotif(n)">
                <div class="notif-icon" [class]="'notif-icon--' + n.type">
                  <svg *ngIf="n.type === 'order'" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>
                  <svg *ngIf="n.type === 'stock'" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                </div>
                <div class="notif-content">
                  <p class="notif-item-title">{{ n.title }}</p>
                  <p class="notif-item-body">{{ n.body }}</p>
                </div>
                <span *ngIf="n.time" class="notif-time">{{ n.time }}</span>
              </button>
            </div>
          </div>
        </div>

        <div class="topbar-divider"></div>
        <div class="topbar-user">
          <div class="user-avatar">{{ authService.currentUser?.name?.charAt(0) | uppercase }}</div>
          <p class="user-name">{{ authService.currentUser?.name }}</p>
        </div>

        <!-- Logout only shown on mobile (sidebar footer not visible) -->
        <button type="button" class="topbar-logout-btn" aria-label="Sair" (click)="logout()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </header>

    <!-- Page content -->
    <main class="admin-content">
      <router-outlet></router-outlet>
    </main>
  </div>

  <app-toast-container></app-toast-container>
</div>
